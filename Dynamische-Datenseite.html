<!Doctype html>
<head>
  <meta charset="UTF-8">
  <script>
  // Lokale Daten
  const stadtteile = ["Urfahr", "Innere Stadt", "Bindermichel"];
  const liste = document.getElementById("liste-linz");
  stadtteile.forEach(s => {
    let li = document.createElement("li");
    li.textContent = s;
    liste.appendChild(li);
  });  
  fetch('https://jsonplaceholder.typicode.com/users')
    .then(response => response.json()) // Antwort in JSON umwandeln
    .then(data => {
      const sListe = document.getElementById("service-liste");
      data.forEach(user => {
        let li = document.createElement("li");
        li.textContent = "User: " + user.name; // Wir greifen auf das Feld 'name' zu
        sListe.appendChild(li);
  });
    });
</script>
</head>
<body>
<h1>
  Dynamische Datenseite
</h1>
  <ul ID="liste-linz">
  <li>
    mein Name: Joelyn
    Name meiner Mutter: Kirsten
  </li>  
  </ul>
  <ul ID="service-linz">
    
  </ul>
</body>
