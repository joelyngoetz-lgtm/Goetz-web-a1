<!Doctype html>
<head>
  <meta charset="UTF-8">
<script>
document.addEventListener("DOMContentLoaded", () => {

  // 🔸 1. Linzer Stadtteile + fiktive Namen
  const stadtteile = [
    "Urfahr",
    "Innere Stadt",
    "Bindermichl",
    "Joelyn",     
    "Kirsten"
  ];

  const liste = document.getElementById("liste-linz");

  stadtteile.forEach(s => {
    let li = document.createElement("li");
    li.textContent = s;
    liste.appendChild(li);
  });

  // 🔸 2. User von API laden
  fetch('https://jsonplaceholder.typicode.com/users')
    .then(response => response.json())
    .then(data => {
      const sListe = document.getElementById("service-linz");

      data.forEach(user => {
        let li = document.createElement("li");
        li.textContent = "User: " + user.name;
        sListe.appendChild(li);
      });
    });

});
</script>
</head>
<body>
<h1>
  Dynamische Datenseite
</h1>
  <ul ID="liste-linz">

  </ul>
  <ul ID="service-linz">
    
  </ul>
</body>
